    Publications:
      - title: Condition Errors Refinement in Autoregressive Image Generation
        publisher: International Conference on Learning Representations (ICLR)
        releaseDate: 2025
        url: 
        summary: The paper theoretically compares conditional diffusion models and autoregressive diffusion models under diffusion loss, proving that patch denoising optimization in autoregressive models can effectively reduce conditional errors and obtain a stable conditional distribution. A novel condition improvement method based on Optimal Transport (OT) theory is introduced, thus effectively alleviating the condition inconsistency problem.
